name: Sikshya CI

on:
  push:
    branches: [ main, master, development, 3.0.0 ]
  pull_request:
    branches: [ main, master, development, 3.0.0 ]

jobs:
  # Code Quality and Standards Compliance
  quality-check:
    name: Code Quality (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, xml, ctype, iconv, pdo, pdo_mysql, gd, zip, curl, json
          coverage: none
          
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
        
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-
            ${{ runner.os }}-composer-
            
      # PHPCS installed_paths (WordPress + PHPCompatibility) come from Composer's phpcodesniffer-composer-installer.
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --optimize-autoloader

      - name: Validate Composer
        run: composer validate --strict
        
      - name: PHP Lint (Syntax Check)
        id: php-lint
        run: |
          echo "Running PHP syntax check..."

          files_with_errors=""
          # Check PHP files
          for the_file in $(find . -name "*.php" -not -path './vendor/*' -print ); do
            php -l $the_file || errors="$errors: J"
          done
