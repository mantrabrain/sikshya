name: Sikshya CI

on:
  push:
    branches: [main, master, development, develop]
  pull_request:
    branches: [main, master, development, develop]

jobs:
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0', '8.1', '8.2']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, xml, ctype, iconv, json
          coverage: none

      - name: Composer install
        run: composer install --prefer-dist --no-progress --optimize-autoloader

      - name: Validate composer.json
        run: composer validate --strict

      - name: PHP syntax check (exclude vendor)
        run: |
          set -e
          while IFS= read -r -d '' file; do
            php -l "$file"
          done < <(find . -type f -name '*.php' ! -path './vendor/*' ! -path './node_modules/*' -print0)

      - name: Composer audit
        run: composer audit || true

  build-admin:
    name: Admin assets build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Production build (Vite)
        run: npm run build
