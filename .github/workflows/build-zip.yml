name: Build zip

# Manual only: the release path runs via deploy.yml (SVN + GitHub release asset).
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "7.4"
          coverage: none

      - name: Setup Node (Vite build at plugin root)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install packages (build.sh needs rsync + zip)
        run: sudo apt-get update && sudo apt-get install -y rsync zip

      - name: Install Composer deps (prod)
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction

      - name: Build admin UI
        run: npm ci && npm run build

      - name: Build zip
        run: |
          bash ./build.sh
          ls -la build

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: sikshya-zip
          path: build/*.zip

